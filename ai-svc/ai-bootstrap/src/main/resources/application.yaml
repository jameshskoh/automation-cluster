spring:
  application:
    name: ai-svc
  config:
    import: "sm@"
  cloud:
    gcp:
      project-id: ${GCP_PROJECT_ID}

server:
  port: 8081

qa:
  async:
    # How long the long-polling /qa/async endpoint waits for an answer before returning 504.
    timeout-millis: 300000
  pending:
    # How long a registered-but-unanswered request lingers before the sweeper evicts it and fires
    # its sink's onExpire. Kept under Slack's ~30 min response_url window so the timeout notice
    # still delivers.
    ttl-millis: 1740000
    # How often the sweeper scans for expired pending answers.
    sweep-interval-millis: 60000

slack:
  app-token: "${sm@slack-app-token}"
  bot-token: "${sm@slack-bot-token}"

gcp:
  pubsub:
    gateway-requests:
      project-id: ${GCP_PROJECT_ID}
      topic-id: ${GATEWAY_REQUESTS_PUBSUB_TOPIC_ID}
    claude-automator-responses:
      project-id: ${GCP_PROJECT_ID}
      subscription-id: ${CLAUDE_AUTOMATOR_RESPONSES_PUBSUB_SUBSCRIPTION_ID}
